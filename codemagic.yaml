workflows:
  ios-release:
    name: GemSprout iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules

    integrations:
      app_store_connect: GemSprout ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gemsprout.ios
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
          npm prune --legacy-peer-deps

      - name: Sync Capacitor to iOS
        script: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp manifest.json www/
          cp *.png www/
          npx cap add ios
          cp GoogleService-Info.plist ios/App/App/
          # Generate iOS app icons from source image
          mkdir -p assets
          cp "GemSprout Icon.png" assets/icon-only.png
          npx capacitor-assets generate --ios
          npx cap sync ios

      - name: Add GoogleService-Info.plist to Xcode bundle resources
        script: |
          gem install xcodeproj --no-document
          ruby - <<'EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/App/App.xcodeproj')
          target = project.targets.first
          already_added = target.resources_build_phase.files.any? { |f|
            f.file_ref&.path == 'GoogleService-Info.plist'
          }
          unless already_added
            file_ref = project.main_group['App'].new_file('GoogleService-Info.plist')
            target.add_resources([file_ref])
            project.save
            puts 'Added GoogleService-Info.plist to bundle resources'
          else
            puts 'GoogleService-Info.plist already in bundle resources'
          end
          EOF

      - name: Set Info.plist flags
        script: |
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist || plutil -replace ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist
          plutil -insert NSCameraUsageDescription -string "GemSprout uses your camera so kids can take before and after photos of completed chores." ios/App/App/Info.plist || plutil -replace NSCameraUsageDescription -string "GemSprout uses your camera so kids can take before and after photos of completed chores." ios/App/App/Info.plist
          plutil -insert NSFaceIDUsageDescription -string "GemSprout uses Face ID to let parents quickly and securely unlock the app." ios/App/App/Info.plist || plutil -replace NSFaceIDUsageDescription -string "GemSprout uses Face ID to let parents quickly and securely unlock the app." ios/App/App/Info.plist
          plutil -insert CFBundleURLTypes -json '[{"CFBundleURLSchemes":["com.googleusercontent.apps.493782739457-ns4jh9okmpv472t3i1pqlutmkjrab508"]}]' ios/App/App/Info.plist || true

      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST + 1))
        working_directory: ios/App

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
