workflows:
  ios-release:
    name: GemSprout iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: GemSprout ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gemsprout.ios
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Sync Capacitor to iOS
        script: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp *.png www/
          npx cap add ios
          npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST + 1))
        working_directory: ios/App

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Set to true when ready for full App Store submission:
        submit_to_app_store: false
