<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GemSprout v2">
    <meta name="theme-color" content="#1D6B57">
    <title>GemSprout v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@700;800;900&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">
    <script type="module" src="/src/app/main.ts"></script>
  </head>
  <body>
    <div id="screen-auth" class="screen"></div>
    <div id="screen-home" class="screen">
      <div id="home-content"></div>
    </div>
    <div id="screen-setup" class="screen">
      <div id="setup-gate"></div>
      <div class="setup-wrap" id="setup-content"></div>
    </div>
    <div id="screen-pin" class="screen">
      <div id="pin-content"></div>
    </div>
    <div id="screen-kid" class="screen">
      <header class="app-header" id="kid-header"></header>
      <main class="main-content" id="kid-content"></main>
      <nav class="nav-bar" id="kid-nav"></nav>
    </div>
    <div id="screen-parent" class="screen">
      <header class="app-header" id="parent-header"></header>
      <main class="main-content" id="parent-content"></main>
      <nav class="nav-bar" id="parent-nav"></nav>
    </div>
    <div id="ptr-indicator"></div>
    <div id="modal-root"></div>
    <div id="celebration-root"></div>
    <div id="confetti-root"></div>
    <div id="adv-editor-root"></div>
    <div id="settings-root"></div>
    <div id="nl-root"></div>
  </body>
</html>
