// ── LIFETIME STATS ────────────────────────────────────────────
function buildMemberStats(member) {
  const hist = (D.history || []).filter(h => h.memberId === member.id);
  normalizeMember(member);

  // Chore history breakdown
  const choreHist  = hist.filter(h => h.type === 'chore');
  const prizeHist  = hist.filter(h => h.type === 'prize');
  const penaltyHist = hist.filter(h => h.type === 'penalty');
  const bonusHist  = hist.filter(h => h.type === 'bonus');
  const levelHist  = hist.filter(h => h.type === 'level');

  // Per-chore counts
  const choreCount = {};
  choreHist.forEach(h => { choreCount[h.title] = (choreCount[h.title] || 0) + 1; });
  const choreBreakdown = Object.entries(choreCount).sort((a,b) => b[1]-a[1]);

  // Per-prize counts (from prize.redemptions)
  const prizeCount = {};
  (D.prizes || []).forEach(p => {
    const count = (p.redemptions || []).filter(r => r.memberId === member.id).length;
    if (count > 0) prizeCount[p.title] = { count, icon: p.icon || '🎁', cost: p.cost };
  });
  const prizeBreakdown = Object.entries(prizeCount).sort((a,b) => b[1].count - a[1].count);

  // Active days (days with any history)
  const activeDates = new Set(hist.map(h => h.date));
  const daysActive = activeDates.size;

  // Most productive date
  const ptsByDate = {};
  choreHist.forEach(h => { ptsByDate[h.date] = (ptsByDate[h.date]||0) + (h.points||0); });
  const bestDate = Object.entries(ptsByDate).sort((a,b)=>b[1]-a[1])[0];

  // Favorite chore
  const favChore = choreBreakdown[0] || null;

  // NL time
  const nlSecs = member.nlLifetimeSecs || 0;
  const nlFmt = nlSecs === 0 ? '0s' : `${Math.floor(nlSecs/60)}m ${nlSecs%60}s`;

  // Level info
  const lvlInfo = getMemberLevel(member);

  return {
    choreDone:        choreHist.length,
    starsEarned:      choreHist.reduce((s,h) => s + (h.points||0), 0),
    rewardCount:      prizeHist.length,
    pointsSpent:      prizeHist.reduce((s,h) => s + Math.abs(h.points||0), 0),
    penaltyCount:     penaltyHist.length,
    penaltyAmount:    penaltyHist.reduce((s,h) => s + Math.abs(h.points||0), 0),
    nlLifetimeSecs:   nlSecs,
    nlFmt,
    totalXP:          member.xp || member.totalEarned || 0,
    badgeCount:       (member.badges || []).length,
    bestStreak:       member.streak?.best || 0,
    currentStreak:    member.streak?.current || 0,
    bestComboStreak:  member.comboStreak?.best || 0,
    currentComboStreak: member.comboStreak?.current || 0,
    savings:          member.savings || 0,
    comboCount:       bonusHist.length,
    comboStars:       bonusHist.reduce((s,h) => s + Math.abs(h.points||0), 0),
    levelUps:         Math.max(levelHist.length, lvlInfo.current.level - 1),
    currentLevel:     lvlInfo.current,
    daysActive,
    bestDate:         bestDate ? { date: bestDate[0], pts: bestDate[1] } : null,
    favChore,
    avgChoresPerDay:  daysActive > 0 ? (choreHist.length / daysActive).toFixed(1) : '—',
    choreBreakdown,
    prizeBreakdown,
    totalPoints:      member.points || 0,
    totalEarned:      member.totalEarned || 0,
  };
}

function _statTile(icon, label, value, color, sub) {
  return `
    <div style="background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.07);display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-size:1.6rem">${icon}</div>
      <div style="font-size:1.35rem;font-weight:800;color:${color||'#1f2937'};line-height:1.1">${value}</div>
      <div style="font-size:0.72rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em">${label}</div>
      ${sub ? `<div style="font-size:0.7rem;color:#9ca3af">${sub}</div>` : ''}
    </div>`;
}

function _statSection(title, tilesHtml) {
  return `
    <div style="margin-bottom:18px">
      <div style="font-size:0.78rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;margin-bottom:8px;padding:0 2px">${title}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${tilesHtml}</div>
    </div>`;
}

function _statBreakdownTable(rows, col1, col2) {
  if (!rows.length) return `<div style="color:#9ca3af;font-size:0.85rem;padding:6px 0">None yet</div>`;
  return `<table style="width:100%;border-collapse:collapse;font-size:0.85rem">
    ${rows.map(([name,val],i) => `
      <tr style="border-bottom:1px solid #f3f4f6">
        <td style="padding:5px 4px;font-weight:${i===0?'700':'500'}">${esc(name)}</td>
        <td style="padding:5px 4px;text-align:right;font-weight:700;color:#6C63FF">${val} ${col2}</td>
      </tr>`).join('')}
  </table>`;
}

function renderMemberStatsCard(member) {
  const s = buildMemberStats(member);
  const color = member.color || '#6C63FF';

  const choresSection = _statSection('⭐ Chores & Points',
    _statTile('✅','Chores Done', s.choreDone, '#166534') +
    _statTile('⭐','Stars Earned', s.starsEarned, '#92400e') +
    _statTile('🔮','Total XP', s.totalXP, '#4c1d95')
  );

  const levelSection = _statSection('🏆 Level & Streaks',
    _statTile('🏆','Level', `${s.currentLevel.icon} ${s.currentLevel.level}`, color, s.currentLevel.name) +
    _statTile('🔥','Best Streak', `${s.bestStreak}d`, '#b45309', s.currentStreak > 0 ? `${s.currentStreak}d now` : '') +
    _statTile('⚡','Best Combo Streak', `${s.bestComboStreak}d`, '#92400E', s.currentComboStreak > 0 ? `${s.currentComboStreak}d now` : '') +
    _statTile('📅','Days Active', s.daysActive, '#0e7490')
  );

  const rewardSection = _statSection('🎁 Rewards & Combos',
    _statTile('🎁','Prizes Won', s.rewardCount, '#1e40af') +
    _statTile('⚡','Combos Hit', s.comboCount, '#b45309', `+${s.comboStars} bonus pts`) +
    _statTile('💰','Saved Up', `${s.savings}★`, '#166534')
  );

  const badgeSection = _statSection('🎖️ Achievements',
    _statTile('🎖️','Badges', s.badgeCount, '#7c3aed') +
    _statTile('📈','Level-Ups', s.levelUps, '#0f766e') +
    _statTile('📊','Avg/Day', s.avgChoresPerDay, '#374151', 'chores per active day')
  );

  const penaltySection = _statSection('🔇 Penalties',
    _statTile('🔇','Penalties', s.penaltyCount, '#991b1b') +
    _statTile('💸','Pts Lost', s.penaltyAmount, '#991b1b') +
    _statTile('⏱️','NL Time', s.nlFmt, '#b45309', 'lifetime')
  );

  const bestDaySub = s.bestDate ? `${fmtDate(s.bestDate.date)} · ${s.bestDate.pts} pts` : 'No data yet';
  const favChoreSub = s.favChore ? `${s.favChore[1]}× completed` : 'No chores yet';
  const extraSection = _statSection('🌟 Fun Facts',
    _statTile('🗓️','Best Day', s.bestDate ? `${s.bestDate.pts}★` : '—', '#d97706', bestDaySub) +
    _statTile('❤️','Fav Chore', s.favChore ? `${s.favChore[0].split(' ')[0]}` : '—', '#db2777', favChoreSub) +
    _statTile('💵','Pts Spent', s.pointsSpent, '#374151', 'on prizes')
  );

  // Chore breakdown table
  const choreTableRows = s.choreBreakdown.map(([name,count]) => [name, count]);
  const choreTable = `
    <div style="margin-bottom:18px">
      <div style="font-size:0.78rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;margin-bottom:8px">📋 Chore Breakdown</div>
      ${_statBreakdownTable(choreTableRows.slice(0,10), 'Chore', 'times')}
    </div>`;

  // Prize breakdown table
  const prizeTableRows = s.prizeBreakdown.map(([name,info]) => [
    `${info.icon} ${name}`, `${info.count}×`
  ]);
  const prizeTable = `
    <div style="margin-bottom:18px">
      <div style="font-size:0.78rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;margin-bottom:8px">🎁 Prize Breakdown</div>
      ${prizeTableRows.length
        ? `<table style="width:100%;border-collapse:collapse;font-size:0.85rem">
            ${prizeTableRows.slice(0,10).map(([name,val],i) => `
              <tr style="border-bottom:1px solid #f3f4f6">
                <td style="padding:5px 4px;font-weight:${i===0?'700':'500'}">${esc(name)}</td>
                <td style="padding:5px 4px;text-align:right;font-weight:700;color:#6C63FF">${val}</td>
              </tr>`).join('')}
          </table>`
        : '<div style="color:#9ca3af;font-size:0.85rem;padding:6px 0">No prizes redeemed yet</div>'
      }
    </div>`;

  return `
    <div class="card" style="border-top:4px solid ${color};padding:20px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
        <span style="font-size:2.5rem">${member.avatar||'🙂'}</span>
        <div>
          <div style="font-size:1.3rem;font-weight:800">${esc(member.name)}</div>
          <div style="font-size:0.85rem;color:#6b7280">${s.currentLevel.icon} ${s.currentLevel.name} · ${s.totalEarned} total stars earned</div>
        </div>
      </div>
      ${choresSection}
      ${levelSection}
      ${rewardSection}
      ${badgeSection}
      ${penaltySection}
      ${extraSection}
      ${choreTable}
      ${prizeTable}
    </div>`;
}

function renderStatsPage(container) {
  if (!container) return;
  const viewer = S.currentUser;
  const isKid  = viewer?.role === 'kid';
  const kids   = D.family.members.filter(m => m.role === 'kid');

  let html = `<div style="padding-bottom:20px"><div style="font-size:1.2rem;font-weight:800;padding:16px 0 12px">📊 Lifetime Stats</div>`;

  if (isKid) {
    html += renderMemberStatsCard(viewer);
  } else {
    if (kids.length === 0) {
      html += `<div class="empty-state"><div class="empty-icon">👶</div><div class="empty-text">No kids added yet</div></div>`;
    } else {
      kids.forEach(kid => { html += renderMemberStatsCard(kid); });
    }
  }

  html += `</div>`;
  container.innerHTML = html;
}

const _expandedSlots = new Set(); // 'choreId_kidId'
function toggleSlotExpand(key) {
  if (_expandedSlots.has(key)) _expandedSlots.delete(key);
  else _expandedSlots.add(key);
  renderParentHome();
}

function renderParentHome() {
  const kids    = D.family.members.filter(m=>m.role==='kid');
  const pending = pendingApprovals();
  const t       = today();

  // Pending approvals
  let html = '';
  if (pending.length > 0) {
    html += `<div class="card" style="border:2px solid var(--yellow)">
      <div class="card-title">⏳ Needs Approval</div>`;
    pending.forEach(({chore, memberId, entry}) => {
      const mem = getMember(memberId);
      if (!mem) return;
      const slotLabel = entry.slotId && chore.schedule?.slots
        ? (chore.schedule.slots.find(s=>s.id===entry.slotId)?.label || '') : '';
      const isBefore = entry.entryType === 'before';
      const entryBadge = isBefore
        ? `<span style="background:#EDE9FE;color:var(--purple);border-radius:6px;padding:2px 8px;font-size:0.75rem;font-weight:700;margin-left:6px">BEFORE</span>`
        : entry.entryType === 'after'
        ? `<span style="background:#DCFCE7;color:#166534;border-radius:6px;padding:2px 8px;font-size:0.75rem;font-weight:700;margin-left:6px">DONE</span>`
        : '';
      const ptsLabel = isBefore ? 'Approve to let them start (no pts yet)' : `+${chore.points} pts`;
      const photoHtml = entry.photoUrl
        ? `<img src="${entry.photoUrl}" class="photo-approval-thumb" onclick="viewPhoto('${entry.photoUrl}')" alt="Photo" title="Click to view full size">`
        : '';
      html += `
        <div class="admin-card" style="flex-wrap:wrap;gap:10px">
          <span class="admin-icon">${chore.icon}</span>
          <div class="admin-info" style="flex:1;min-width:0">
            <div class="admin-name">${esc(chore.title)}${entryBadge}${slotLabel?` <span style="font-size:0.8rem;color:var(--muted)">(${esc(slotLabel)})</span>`:''}</div>
            <div class="admin-meta">${mem.avatar} ${esc(mem.name)} · ${ptsLabel} · ${fmtDate(entry.date)}</div>
            ${photoHtml}
          </div>
          <div class="admin-actions" style="align-self:flex-start">
            <button class="btn-icon-sm btn-icon-approve" onclick="approveChore('${chore.id}','${memberId}','${entry.id}')">✓</button>
            <button class="btn-icon-sm btn-icon-reject"  onclick="rejectChore('${chore.id}','${memberId}','${entry.id}')">✕</button>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  // Kids overview
  let kidsHtml = '';
  if (kids.length === 0) {
    kidsHtml = `<div class="empty-state"><div class="empty-icon">👶</div><div class="empty-text">No kids yet — go to Setup!</div></div>`;
  }
  kids.forEach(kid => {
    const myChores  = D.chores.filter(c=>c.assignedTo?.includes(kid.id));
    const doneCount = myChores.filter(c=>choreStatus(c,kid.id)==='done').length;
    const pendCount = myChores.filter(c=>choreStatus(c,kid.id)==='pending').length;
    const pct       = myChores.length>0 ? Math.round(doneCount/myChores.length*100) : 0;
    const kidCombo  = new Set(getDailyCombo(kid.id));
    const choreRows = myChores.length === 0
      ? `<div class="empty-state" style="padding:16px 8px"><div class="empty-text">No chores assigned</div></div>`
      : `<div class="kid-overview-list">${myChores.map(chore => {
          const progress = getChoreProgress(chore, kid.id);
          const status = progress.status;
          const isDone = status === 'done';
          const slotsDone  = progress.doneCount || 0;
          const slotsTotal = progress.targetCount || progress.slotStatuses?.length || 0;
          const statusClass = isDone ? 'done' : status === 'partial' ? 'pending' : status === 'pending' ? 'pending' : 'todo';
          const statusLabel = isDone ? 'Done'
            : status === 'partial'      ? `${slotsDone}/${slotsTotal} done`
            : status === 'pending'      ? 'Waiting'
            : status === 'unavailable'  ? 'Later'
            : 'To do';
          const isCombo = kidCombo.has(chore.id);
          const expandKey = `${chore.id}_${kid.id}`;
          const isExpanded = _expandedSlots.has(expandKey);

          let actionBtn, slotExpandSection = '';
          if (progress.isSlotMode) {
            // Expand/collapse toggle button
            actionBtn = `<button class="btn-icon-sm" style="margin-left:6px;flex-shrink:0;background:#EDE9FE;color:var(--purple);font-size:0.75rem" title="Show slots" onclick="toggleSlotExpand('${expandKey}')">${isExpanded ? '▲' : '▼'}</button>`;
            if (isExpanded) {
              const slotRows = (progress.slotStatuses || []).map(({ slot, status: ss }) => {
                const slotLabel = slot.label || (slot.start ? `${slot.start}–${slot.end}` : 'Slot');
                let slotPill, slotBtn;
                if (ss === 'done') {
                  slotPill = `<span class="kid-overview-status done" style="font-size:0.7rem;padding:2px 6px">Done</span>`;
                  slotBtn  = `<button class="btn-icon-sm btn-icon-delete" style="width:28px;height:28px;font-size:0.8rem;flex-shrink:0" title="Undo" onclick="parentUnmarkSlotDone('${chore.id}','${kid.id}','${slot.id}')">↩</button>`;
                } else if (ss === 'pending') {
                  slotPill = `<span class="kid-overview-status pending" style="font-size:0.7rem;padding:2px 6px">Waiting</span>`;
                  slotBtn  = '';
                } else {
                  slotPill = `<span class="kid-overview-status todo" style="font-size:0.7rem;padding:2px 6px">${ss === 'waiting' ? 'Later' : 'To do'}</span>`;
                  slotBtn  = `<button class="btn-icon-sm btn-icon-approve" style="width:28px;height:28px;font-size:0.8rem;flex-shrink:0" title="Mark done" onclick="parentMarkSlotDone('${chore.id}','${kid.id}','${slot.id}')">✓</button>`;
                }
                return `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:#f9fafb;border-radius:8px">
                  <span style="flex:1;font-size:0.82rem;color:#374151">${esc(slotLabel)}</span>
                  ${slotPill}${slotBtn}
                </div>`;
              }).join('');
              slotExpandSection = `<div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">${slotRows}</div>`;
            }
          } else {
            actionBtn = isDone
              ? `<button class="btn-icon-sm btn-icon-delete" style="margin-left:6px;flex-shrink:0" title="Remove completion" onclick="parentUnmarkChoreDone('${chore.id}','${kid.id}')">↩</button>`
              : `<button class="btn-icon-sm btn-icon-approve" style="margin-left:6px;flex-shrink:0" title="Mark done (award points)" onclick="parentMarkChoreDone('${chore.id}','${kid.id}')">✓</button>`;
          }

          return `
            <div class="kid-overview-item" style="${isCombo ? 'background:#FFFBEB;box-shadow:inset 3px 0 0 #F59E0B;' : ''}${isExpanded ? 'flex-wrap:wrap;' : ''}">
              <div style="flex:1;min-width:0">
                <div style="font-weight:700">${chore.icon} ${esc(chore.title)}${isCombo ? ' <span style="font-size:0.65rem;font-weight:800;color:#D97706;vertical-align:middle">⚡</span>' : ''}</div>
                <div style="font-size:0.82rem;color:var(--muted)">${fmtPts(chore.points)} · ${esc(choreScheduleSummary(chore))}</div>
              </div>
              <span class="kid-overview-status ${statusClass}">${statusLabel}</span>
              ${actionBtn}
              ${slotExpandSection ? `<div style="width:100%;margin-top:0">${slotExpandSection}</div>` : ''}
            </div>`;
        }).join('')}</div>`;
    kidsHtml += `
      <div class="kid-overview-card" style="border-top:4px solid ${kid.color||'#6C63FF'}">
        <div class="member-row" style="padding:0;box-shadow:none;background:transparent">
          <span class="member-avatar">${kid.avatar||'🙂'}</span>
          <div class="member-info">
            <div class="member-name">${esc(kid.name)}</div>
            <div class="member-stats">${doneCount}/${myChores.length} chores · ${pendCount>0?`${pendCount} pending · `:''}${fmtPts(kid.points||0)}</div>
            <div class="progress-wrap" style="height:8px;margin:6px 0 0">
              <div class="progress-fill" style="width:${pct}%;background:${kid.color||'var(--purple)'}"></div>
            </div>
          </div>
          <div class="member-pts">${kid.points||0}</div>
        </div>
        ${choreRows}
      </div>`;
  });
  html += `<div class="card"><div class="card-title">👨‍👩‍👧‍👦 Kids Today</div>${kids.length>0?`<div class="overview-kids-grid">${kidsHtml}</div>`:kidsHtml}</div>`;

  // Today's activities
  const todayActivities = D.activities.filter(a=>a.date===t);
  if (todayActivities.length > 0) {
    html += `<div class="card"><div class="card-title">📅 Today's Plans</div>`;
    todayActivities.forEach(a => { html += activityCard(a); });
    html += `</div>`;
  }

  // Quick actions
  html += `
    <div class="card">
      <div class="card-title">⚡ Quick Actions</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="btn btn-primary btn-sm" onclick="showChoreModal()">+ Add Chore</button>
        <button class="btn btn-pink   btn-sm" onclick="showPrizeModal()">+ Add Prize</button>
        <button class="btn btn-teal   btn-sm" onclick="showGoalModal()">🎯 Set Goal</button>
        <button class="btn btn-warning btn-sm" onclick="showActivityModal()">+ Plan Event</button>
        <button class="btn btn-danger  btn-sm" style="grid-column:span 2;background:#EF4444;color:#fff;font-size:1rem;padding:14px"
                onclick="showNotListening()">🔇 You're Not Listening</button>
      </div>
    </div>`;

  // NL time tracker
  const nlKids = D.family.members.filter(m => m.role === 'kid');
  const nlRows = nlKids.map(k => {
    normalizeMember(k);
    const secs = (k.nlDate === t ? k.nlTodaySecs || 0 : 0);
    const label = secs === 0 ? 'None today' : `${Math.floor(secs/60)}m ${secs%60}s`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6">
      <span>${k.avatar||'🙂'} ${esc(k.name)}</span>
      <span style="font-weight:700;color:${secs>0?'#EF4444':'var(--muted)'}">${label}</span>
    </div>`;
  }).join('');
  html += `
    <div class="card">
      <div class="card-title">🔇 Not-Listening Time Today</div>
      ${nlRows || '<div style="color:var(--muted);font-size:0.9rem">No kids added yet</div>'}
    </div>`;

  // Recent Activity
  const recentHistory = (D.history || []).slice(0, 10);

// Parent directly marks a chore done for a kid (no kid submission required)
function parentMarkChoreDone(choreId, memberId) {
  const chore  = D.chores.find(c => c.id === choreId);
  const member = getMember(memberId);
  if (!chore || !member) return;

  const progress = getChoreProgress(chore, memberId);
  if (progress.status === 'done') {
    toast(`${chore.icon} Already marked done for ${member.name}`);
    return;
  }

  if (!chore.completions) chore.completions = {};
  chore.completions[memberId] = normalizeCompletionEntries(chore.completions[memberId]);

  let totalPts = 0;

  if (progress.isSlotMode) {
    // Complete only the currently-available slot(s); if none are in-window, complete just the earliest waiting slot
    const available = (progress.slotStatuses || []).filter(s => s.status === 'available');
    const waiting   = (progress.slotStatuses || []).filter(s => s.status === 'waiting');
    const toComplete = available.length > 0 ? available : waiting.slice(0, 1);
    if (toComplete.length === 0) { toast(`${chore.icon} All slots already submitted for ${member.name}`); return; }
    toComplete.forEach(({ slot }) => {
      chore.completions[memberId].push({
        id: genId(), status: 'done', date: today(), createdAt: Date.now(),
        slotId: slot.id, photoUrl: null, entryType: null,
      });
      totalPts += chore.points;
    });
  } else {
    chore.completions[memberId].push({
      id: genId(), status: 'done', date: today(), createdAt: Date.now(),
      slotId: null, photoUrl: null, entryType: null,
    });
    totalPts = chore.points;
  }

  member.points      = (member.points      || 0) + totalPts;
  member.totalEarned = (member.totalEarned || 0) + totalPts;
  addHistory('chore', memberId, chore.title, totalPts);
  checkAfterPointsAwarded(member, totalPts);
  saveData();
  toast(`✅ Marked "${chore.title}" done for ${member.name} (+${totalPts} pts)`);
  renderParentHome();
  renderParentHeader();
  renderParentNav();
}

function parentUnmarkChoreDone(choreId, memberId) {
  const chore  = D.chores.find(c => c.id === choreId);
  const member = getMember(memberId);
  if (!chore || !member) return;

  const entries = normalizeCompletionEntries(chore.completions?.[memberId]);
  // Find the most recent 'done' entry that is NOT a 'before' photo entry
  const idx = [...entries].reverse().findIndex(e => e.status === 'done' && e.entryType !== 'before');
  if (idx === -1) { toast('No completion found to remove'); return; }
  const realIdx = entries.length - 1 - idx;

  entries.splice(realIdx, 1);
  if (entries.length === 0) delete chore.completions[memberId];
  else chore.completions[memberId] = entries;

  // Reverse the points
  const deduct = Math.min(chore.points, member.points || 0);
  member.points      = (member.points      || 0) - deduct;
  member.totalEarned = Math.max(0, (member.totalEarned || 0) - chore.points);
  if (D.settings.levelingEnabled !== false) member.xp = Math.max(0, (member.xp || 0) - chore.points);
  addHistory('penalty', memberId, `↩ Removed: ${chore.title}`, -deduct);
  saveData();
  toast(`↩ Removed "${chore.title}" completion for ${member.name} (−${deduct} pts)`);
  renderParentHome();
  renderParentHeader();
  renderParentNav();
}

function parentMarkSlotDone(choreId, memberId, slotId) {
  const chore  = D.chores.find(c => c.id === choreId);
  const member = getMember(memberId);
  if (!chore || !member) return;
  const progress = getChoreProgress(chore, memberId);
  const slotStatus = progress.slotStatuses?.find(s => s.slot.id === slotId);
  if (!slotStatus) { toast('Slot not found'); return; }
  if (slotStatus.status === 'done')    { toast('Already done'); return; }
  if (slotStatus.status === 'pending') { toast('Already submitted — waiting for approval'); return; }
  if (!chore.completions) chore.completions = {};
  chore.completions[memberId] = normalizeCompletionEntries(chore.completions[memberId]);
  chore.completions[memberId].push({
    id: genId(), status: 'done', date: today(), createdAt: Date.now(),
    slotId, photoUrl: null, entryType: null,
  });
  member.points      = (member.points      || 0) + chore.points;
  member.totalEarned = (member.totalEarned || 0) + chore.points;
  addHistory('chore', memberId, chore.title, chore.points);
  checkAfterPointsAwarded(member, chore.points);
  saveData();
  toast(`✅ ${chore.icon} ${slotStatus.slot.label || 'Slot'} done for ${member.name} (+${chore.points} pts)`);
  renderParentHome();
  renderParentHeader();
  renderParentNav();
}

function parentUnmarkSlotDone(choreId, memberId, slotId) {
  const chore  = D.chores.find(c => c.id === choreId);
  const member = getMember(memberId);
  if (!chore || !member) return;
  const entries = normalizeCompletionEntries(chore.completions?.[memberId]);
  const idx = entries.findIndex(e => e.slotId === slotId && e.status === 'done' && e.date === today() && e.entryType !== 'before');
  if (idx === -1) { toast('No completion found to remove'); return; }
  const slot = D.chores.find(c => c.id === choreId)?.schedule?.slots?.find(s => s.id === slotId);
  entries.splice(idx, 1);
  if (entries.length === 0) delete chore.completions[memberId];
  else chore.completions[memberId] = entries;
  const deduct = Math.min(chore.points, member.points || 0);
  member.points      = (member.points      || 0) - deduct;
  member.totalEarned = Math.max(0, (member.totalEarned || 0) - chore.points);
  if (D.settings.levelingEnabled !== false) member.xp = Math.max(0, (member.xp || 0) - chore.points);
  addHistory('penalty', memberId, `↩ Removed: ${chore.title} (${slot?.label || 'slot'})`, -deduct);
  saveData();
  toast(`↩ Removed ${chore.icon} ${slot?.label || 'slot'} for ${member.name} (−${deduct} pts)`);
  renderParentHome();
  renderParentHeader();
  renderParentNav();
}

// ── DRAG-TO-REORDER ──────────────────────────────────────────
function applyChoreReorder(newOrderIds) {
  // Slot the reordered IDs back into the same positions they occupied in D.chores
  const idSet = new Set(newOrderIds);
  const positions = [];
  D.chores.forEach((c, i) => { if (idSet.has(c.id)) positions.push(i); });
  positions.sort((a, b) => a - b);
  const lookup = Object.fromEntries(D.chores.map(c => [c.id, c]));
  const newChores = [...D.chores];
  newOrderIds.forEach((id, rank) => { newChores[positions[rank]] = lookup[id]; });
  D.chores = newChores;
  saveData();
}

function initSortable(containerEl, onReorder) {
  if (!containerEl) return;
  const items = () => [...containerEl.querySelectorAll('[data-drag-id]')];

  // ── Desktop HTML5 DnD ──
  let dragSrc = null;

  containerEl.addEventListener('dragstart', e => {
    dragSrc = e.target.closest('[data-drag-id]');
    if (!dragSrc) return;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrc.dataset.dragId);
    dragSrc.classList.add('drag-src');
  });
  containerEl.addEventListener('dragend', () => {
    items().forEach(el => el.classList.remove('drag-src', 'drag-over'));
    dragSrc = null;
  });
  containerEl.addEventListener('dragover', e => {
    const target = e.target.closest('[data-drag-id]');
    if (!target || !dragSrc || target === dragSrc) { e.preventDefault(); return; }
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    items().forEach(el => el.classList.remove('drag-over'));
    target.classList.add('drag-over');
  });
  containerEl.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('[data-drag-id]');
    if (!target || !dragSrc || target === dragSrc) return;
    items().forEach(el => el.classList.remove('drag-over'));
    const all = items();
    if (all.indexOf(dragSrc) < all.indexOf(target)) target.after(dragSrc);
    else target.before(dragSrc);
    dragSrc.classList.remove('drag-src');
    onReorder(items().map(el => el.dataset.dragId));
  });

  // ── Mobile touch ──
  let touchSrc = null, touchOver = null;

  containerEl.addEventListener('touchstart', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    touchSrc = handle.closest('[data-drag-id]');
    if (!touchSrc) return;
    touchSrc.classList.add('drag-src');
    e.preventDefault();
  }, { passive: false });

  containerEl.addEventListener('touchmove', e => {
    if (!touchSrc) return;
    e.preventDefault();
    const touch = e.touches[0];
    touchSrc.style.pointerEvents = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    touchSrc.style.pointerEvents = '';
    const target = el?.closest('[data-drag-id]');
    if (touchOver && touchOver !== target) touchOver.classList.remove('drag-over');
    if (target && target !== touchSrc) { target.classList.add('drag-over'); touchOver = target; }
    else touchOver = null;
  }, { passive: false });

  containerEl.addEventListener('touchend', () => {
    if (!touchSrc) return;
    touchSrc.classList.remove('drag-src');
    if (touchOver) {
      touchOver.classList.remove('drag-over');
      const all = items();
      if (all.indexOf(touchSrc) < all.indexOf(touchOver)) touchOver.after(touchSrc);
      else touchOver.before(touchSrc);
      onReorder(items().map(el => el.dataset.dragId));
    }
    touchSrc = null; touchOver = null;
  });
}

// Lazy-loaded emojilib dataset (full ~1800 Unicode emoji with keywords)
let _emojiLib = null;
let _emojiLibLoading = false;

async function loadEmojiLib() {
  if (_emojiLib) return _emojiLib;
  if (_emojiLibLoading) return null;
  _emojiLibLoading = true;
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/emojilib@3.0.0/dist/emoji-en-US.json');
    const raw = await res.json();
    // Convert { "😀": ["grinning", "face"] } → [{ e: "😀", k: "grinning face" }]
    _emojiLib = Object.entries(raw).map(([e, keywords]) => ({ e, k: keywords.join(' ') }));
    _emojiLibLoading = false;
    return _emojiLib;
  } catch(err) {
    _emojiLibLoading = false;
    console.warn('Could not load emojilib — falling back to local map', err);
    _emojiLib = EMOJI_MAP; // fallback to our curated set
    return _emojiLib;
  }
}

function filterIcons(query) {
  const q = query.toLowerCase().trim();
  const cur = document.getElementById('cm-icon')?.value;
  const grid = document.getElementById('icon-picker-grid');
  if (!grid) return;

  // Use whatever dataset is already loaded; trigger a load if not yet started
  const dataset = _emojiLib || EMOJI_MAP;
  const matches = q ? dataset.filter(({k}) => k.includes(q)) : dataset.slice(0, 60);

  if (matches.length === 0) {
    grid.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;padding:8px;grid-column:1/-1">No icons found — try different words.</div>`;
  } else {
    grid.innerHTML = matches.slice(0, 80).map(({e:ic}) =>
      `<div class="icon-opt${ic===cur?' sel':''}" onclick="selChoreIcon(this,'${ic}')">${ic}</div>`
    ).join('');
  }

  // If emojilib isn't loaded yet, kick off the load and refresh when done
  if (!_emojiLib) {
    loadEmojiLib().then(lib => {
      if (lib && document.getElementById('icon-picker-grid')) filterIcons(query);
    });
  }
}

function selChoreIcon(el, icon) {
  document.getElementById('cm-icon').value = icon;
  el.closest('#icon-picker-grid, .icon-picker').querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
}

function setChoreStyle(style) {
  const isSlots = style === 'slots';
  document.getElementById('cm-style-simple')?.classList.toggle('sel', !isSlots);
  document.getElementById('cm-style-slots')?.classList.toggle('sel',  isSlots);
  document.getElementById('cm-simple-fields').style.display = isSlots ? 'none' : 'block';
  document.getElementById('cm-slots-fields').style.display  = isSlots ? 'block' : 'none';
  document.getElementById('cm-style-help').textContent = isSlots
    ? 'Each slot earns points independently when completed during its window.'
    : 'Kids must complete the chore a set number of times. All must be done before points are awarded.';
  if (isSlots && _editSlots.length === 0) {
    _editSlots = [
      { id: genId(), label: 'Morning', start: '06:00', end: '09:00' },
      { id: genId(), label: 'Evening', start: '18:00', end: '21:00' },
    ];
    renderSlotEditor();
  }
}

function renderSlotEditor() {
  const container = document.getElementById('cm-slot-editor');
  if (!container) return;
  container.innerHTML = _editSlots.map((slot, i) => `
    <div class="slot-editor-row">
      <input type="text" placeholder="Label (e.g. Morning)" value="${esc(slot.label)}" oninput="_editSlots[${i}].label=this.value">
      <input type="time" value="${slot.start}" oninput="_editSlots[${i}].start=this.value">
      <input type="time" value="${slot.end}"   oninput="_editSlots[${i}].end=this.value">
      <button class="slot-remove-btn" onclick="removeChoreSlot(${i})">✕</button>
    </div>`).join('');
}

function addChoreSlot() {
  _editSlots.push({ id: genId(), label: '', start: '', end: '' });
  renderSlotEditor();
}

function removeChoreSlot(i) {
  _editSlots.splice(i, 1);
  renderSlotEditor();
}

function toggleChoreScheduleFields() {
  const freq = document.getElementById('cm-freq')?.value || 'day';
  const wrap = document.getElementById('cm-schedule-fields');
  if (!wrap) return;
  wrap.style.display = freq === 'once' ? 'none' : 'block';
}

function toggleChoreDayRow(dayIndex) {
  const enabled = document.getElementById(`cm-day-${dayIndex}`)?.checked;
  const start = document.getElementById(`cm-start-${dayIndex}`);
  const end   = document.getElementById(`cm-end-${dayIndex}`);
  if (start) start.disabled = !enabled;
  if (end)   end.disabled   = !enabled;
}

function saveChore(choreId) {
  const title  = document.getElementById('cm-title')?.value.trim();
  const icon   = document.getElementById('cm-icon')?.value || '📋';
  const points = parseInt(document.getElementById('cm-points')?.value)||10;
  const freq   = document.getElementById('cm-freq')?.value || 'day';
  const photoMode = document.getElementById('cm-photo')?.value || 'none';
  const desc   = document.getElementById('cm-desc')?.value.trim();
  const assigned = [...document.querySelectorAll('input[name=assign]:checked')].map(x=>x.value);

  if (!title) { toast('Enter a chore name'); return; }

  // Determine if using slot mode or simple mode
  const useSlots = document.getElementById('cm-slots-fields')?.style.display !== 'none' && _editSlots.length > 0;
  let scheduleObj;

  if (freq === 'once') {
    scheduleObj = { period:'once', targetCount:1, daysOfWeek:[], windows:{}, slots:null };
  } else if (useSlots) {
    if (_editSlots.length === 0) { toast('Add at least one time slot'); return; }
    const slotDays = WEEKDAY_OPTIONS.filter(d => document.getElementById(`cm-sday-${d.value}`)?.checked).map(d=>d.value);
    if (slotDays.length === 0) { toast('Select at least one day'); return; }
    scheduleObj = { period: freq, targetCount:1, daysOfWeek: slotDays, windows:{}, slots: _editSlots.map(s=>({...s})) };
  } else {
    const repeatCount = Math.max(1, parseInt(document.getElementById('cm-repeat')?.value, 10) || 1);
    const daysOfWeek = WEEKDAY_OPTIONS.filter(d => document.getElementById(`cm-day-${d.value}`)?.checked).map(d=>d.value);
    if (daysOfWeek.length === 0) { toast('Select at least one day for this chore'); return; }
    const windows = {};
    daysOfWeek.forEach(day => {
      const start = document.getElementById(`cm-start-${day}`)?.value || '';
      const end   = document.getElementById(`cm-end-${day}`)?.value   || '';
      if (start || end) windows[day] = { start, end };
    });
    scheduleObj = { period: freq, targetCount: repeatCount, daysOfWeek, windows, slots:null };
  }

  const choreData = { title, icon, points, photoMode, frequency: freq,
    repeatCount: scheduleObj.targetCount, assignedTo: assigned, description: desc, schedule: scheduleObj };

  if (choreId) {
    const index = D.chores.findIndex(x=>x.id===choreId);
    if (index >= 0) D.chores[index] = normalizeChore({ ...D.chores[index], ...choreData });
  } else {
    D.chores.push(normalizeChore({ id:genId(), completions:{}, ...choreData }));
  }
  saveData();
  closeModal();
  toast(choreId ? 'Chore updated!' : 'Chore added!');
  renderParentChores();
}

function deleteChore(choreId) {
  if (!confirm('Delete this chore?')) return;
  D.chores = D.chores.filter(c=>c.id!==choreId);
  saveData();
  toast('Chore deleted');
  renderParentChores();
}

// ── PARENT PLANS (ACTIVITIES) ─────────────────────────────────
function getParentPlansCursor() {
  if (!S.plansCursor) S.plansCursor = today();
  return S.plansCursor;
}

function setParentPlansView(view) {
  S.plansView = view;
  if (!S.plansCursor) S.plansCursor = today();
  renderParentPlans();
}

function setParentPlansCursor(dateStr, view) {
  S.plansCursor = dateStr;
  if (view) S.plansView = view;
  renderParentPlans();
}

function shiftParentPlans(direction) {
  const cursor = getParentPlansCursor();
  if (S.plansView === 'day') {
    S.plansCursor = addDaysToDate(cursor, direction);
  } else if (S.plansView === 'week') {
    S.plansCursor = addDaysToDate(cursor, direction * 7);
  } else {
    S.plansCursor = addMonthsToDate(cursor, direction);
  }
  renderParentPlans();
}

function parentPlansLabel() {
  const cursor = parseDateLocal(getParentPlansCursor());
  if (S.plansView === 'day') {
    return cursor.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  }
  if (S.plansView === 'week') {
    const start = parseDateLocal(startOfWeekDate(getParentPlansCursor()));
    const end = parseDateLocal(addDaysToDate(formatDateLocal(start), 6));
    return `${start.toLocaleDateString('en-US', { month:'short', day:'numeric' })} - ${end.toLocaleDateString('en-US', { month:'short', day:'numeric' })}`;
  }
  return cursor.toLocaleDateString('en-US', { month:'long', year:'numeric' });
}

function renderPlanActivityCard(a, faded) {
  return `
    <div class="admin-card"${faded?' style="opacity:0.6"':''}>
      ${activityCard(a)}
      <div class="admin-actions" style="margin-left:auto;align-self:flex-start">
        <button class="btn-icon-sm btn-icon-edit" onclick="showActivityModal('${a.id}')">✏️</button>
        <button class="btn-icon-sm btn-icon-delete" onclick="deleteActivity('${a.id}')">🗑️</button>
      </div>
    </div>`;
}

function renderParentPlansMonth(cursor) {
  const current = parseDateLocal(cursor);
  const monthStart = new Date(current.getFullYear(), current.getMonth(), 1);
  const monthEnd = new Date(current.getFullYear(), current.getMonth() + 1, 0);
  const gridStart = parseDateLocal(startOfWeekDate(formatDateLocal(monthStart)));
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = `<div class="calendar-grid">${dayNames.map(name => `<div class="calendar-dow">${name}</div>`).join('')}`;

  for (let index = 0; index < 42; index += 1) {
    const cellDate = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + index);
    const cellKey = formatDateLocal(cellDate);
    const activities = D.activities
      .filter(a=>a.date===cellKey)
      .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const isOtherMonth = cellDate < monthStart || cellDate > monthEnd;
    const isToday = cellKey === today();
    html += `
      <button class="calendar-day${isOtherMonth?' is-other':''}${isToday?' is-today':''}" onclick="setParentPlansCursor('${cellKey}','day')">
        <div class="calendar-day-num">${cellDate.getDate()}</div>
        ${activities.slice(0,3).map(a => `<div class="calendar-chip">${a.icon||'📅'} ${esc(a.title)}</div>`).join('')}
        ${activities.length>3?`<div class="calendar-chip">+${activities.length-3} more</div>`:''}
      </button>`;
  }

  html += `</div>`;
  return html;
}

function renderParentPlansWeek(cursor) {
  const weekStart = parseDateLocal(startOfWeekDate(cursor));
  let html = `<div class="week-grid">`;
  for (let offset = 0; offset < 7; offset += 1) {
    const date = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + offset);
    const dateKey = formatDateLocal(date);
    const activities = D.activities
      .filter(a=>a.date===dateKey)
      .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    html += `
      <div class="week-day-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div style="font-weight:800">${date.toLocaleDateString('en-US', { weekday:'long' })}</div>
            <div style="font-size:0.85rem;color:var(--muted)">${date.toLocaleDateString('en-US', { month:'short', day:'numeric' })}</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="setParentPlansCursor('${dateKey}','day')">Open</button>
        </div>
        ${activities.length ? activities.map(a => activityCard(a)).join('') : `<div class="empty-state" style="padding:18px 10px"><div class="empty-text">Nothing planned</div></div>`}
      </div>`;
  }
  html += `</div>`;
  return html;
}

function renderParentPlansDay(cursor) {
  const activities = D.activities
    .filter(a=>a.date===cursor)
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  if (!activities.length) {
    return `<div class="empty-state"><div class="empty-icon">🗓️</div><div class="empty-text">Nothing planned for this day.</div></div>`;
  }
  return activities.map(a => renderPlanActivityCard(a, false)).join('');
}

function renderParentPlans() {
  const t = today();
  const cursor = getParentPlansCursor();
  const past = D.activities
    .filter(a=>a.date<t)
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,5);

  let html = `
    <div class="section-row">
      <span class="section-title">📅 Plans & Activities</span>
      <button class="btn btn-primary btn-sm" onclick="showActivityModal()">+ Add</button>
    </div>
    <div class="schedule-toolbar">
      <div class="schedule-controls">
        <button class="schedule-nav-btn" onclick="shiftParentPlans(-1)">‹</button>
        <div class="schedule-label">${parentPlansLabel()}</div>
        <button class="schedule-nav-btn" onclick="shiftParentPlans(1)">›</button>
      </div>
      <div class="display-mode-row" style="margin-top:0">
        <button class="mode-opt${S.plansView==='day'?' sel':''}" onclick="setParentPlansView('day')"><span class="mode-opt-icon">☀️</span>Day</button>
        <button class="mode-opt${S.plansView==='week'?' sel':''}" onclick="setParentPlansView('week')"><span class="mode-opt-icon">🗓️</span>Week</button>
        <button class="mode-opt${S.plansView==='month'?' sel':''}" onclick="setParentPlansView('month')"><span class="mode-opt-icon">📆</span>Month</button>
      </div>
    </div>`;

  if (S.plansView === 'day') {
    html += renderParentPlansDay(cursor);
  } else if (S.plansView === 'week') {
    html += renderParentPlansWeek(cursor);
  } else {
    html += renderParentPlansMonth(cursor);
  }

  if (past.length > 0) {
    html += `<div class="divider"></div><div class="section-title" style="margin-bottom:10px;color:var(--muted)">Past Events</div>`;
    past.forEach(a => { html += renderPlanActivityCard(a, true); });
  }

  document.getElementById('parent-content').innerHTML = html;
}

function saveActivity(actId) {
  const title = document.getElementById('am-title')?.value.trim();
  const icon  = document.getElementById('am-icon')?.value  || '📅';
  const date  = document.getElementById('am-date')?.value  || today();
  const time  = document.getElementById('am-time')?.value  || '';
  const notes = document.getElementById('am-notes')?.value.trim();
  const who   = [...document.querySelectorAll('input[name=act-who]:checked')].map(x=>x.value);
  if (!title) { toast('Enter an event name'); return; }

  if (actId) {
    const a = D.activities.find(x=>x.id===actId);
    if (a) Object.assign(a, { title, icon, date, time, who, notes });
  } else {
    D.activities.push({ id:genId(), title, icon, date, time, who, notes });
  }
  saveData();
  closeModal();
  toast(actId?'Event updated!':'Event added!');
  renderParentPlans();
}

function deleteActivity(actId) {
  if (!confirm('Delete this event?')) return;
  D.activities = D.activities.filter(a=>a.id!==actId);
  saveData();
  renderParentPlans();
}

// ── ADVANCED DATA EDITOR ──────────────────────────────────────
function showAdvancedEditor() {
  const root = document.getElementById('adv-editor-root');
  root.classList.add('open');
  _advRender();
}

function closeAdvancedEditor() {
  const root = document.getElementById('adv-editor-root');
  root.classList.remove('open');
  root.innerHTML = '';
}

function _advField(label, inputHtml) {
  return `<div class="adv-field-row">
    <span class="adv-field-label">${label}</span>
    ${inputHtml}
  </div>`;
}

function _advInput(type, val, onchange, extra='') {
  const v = val === null || val === undefined ? '' : val;
  return `<input type="${type}" class="adv-field-input" value="${esc(String(v))}"
    ${type==='color'?`value="${v}"`:''}
    onchange="${onchange}" ${extra}>`;
}

function _advCheck(checked, onchange) {
  return `<label style="display:flex;align-items:center;gap:6px;cursor:pointer">
    <input type="checkbox" ${checked?'checked':''} onchange="${onchange}"
      style="width:18px;height:18px;cursor:pointer">
    <span style="font-size:0.82rem;color:#6b7280">${checked?'On':'Off'}</span>
  </label>`;
}

function advSetMember(id, field, val) {
  const m = getMember(id);
  if (!m) return;
  if (field.includes('.')) {
    const [a, b] = field.split('.');
    if (!m[a] || typeof m[a] !== 'object') m[a] = {};
    m[a][b] = val;
  } else {
    m[field] = val;
  }
  saveData();
  _advRefreshStatus(`Member saved`);
}

function advSetChore(id, field, val) {
  const c = D.chores.find(x => x.id === id);
  if (!c) return;
  c[field] = val;
  saveData();
  _advRefreshStatus(`Chore saved`);
}

function advSetPrize(id, field, val) {
  const p = D.prizes.find(x => x.id === id);
  if (!p) return;
  p[field] = val;
  saveData();
  _advRefreshStatus(`Prize saved`);
}

function advClearChoreCompletions(choreId, memberId) {
  const chore = D.chores.find(c => c.id === choreId);
  if (!chore) return;
  if (memberId) {
    if (chore.completions) delete chore.completions[memberId];
  } else {
    chore.completions = {};
  }
  saveData();
  _advRenderPreserving();
  _advRefreshStatus('Completions cleared');
}

function advDeleteHistory(entryId) {
  const idx = D.history.findIndex(h => h.id === entryId);
  if (idx < 0) return;
  D.history.splice(idx, 1);
  saveData();
  const row = document.querySelector(`[data-hist-id="${entryId}"]`);
  if (row) row.remove();
  _advRefreshStatus('Deleted');
}

function _advRenderPreserving() {
  const root = document.getElementById('adv-editor-root');
  const scroll = root ? root.scrollTop : 0;
  _advRender();
  if (root) root.scrollTop = scroll;
}

function advApplyRawJson() {
  const ta = document.getElementById('adv-raw-json');
  const statusEl = document.getElementById('adv-json-status');
  try {
    const parsed = JSON.parse(ta.value);
    D = normalizeData(parsed);
    saveData();
    if (statusEl) { statusEl.className = 'adv-status ok'; statusEl.textContent = '✅ Applied & saved successfully'; }
    _advRenderPreserving();
  } catch(e) {
    if (statusEl) { statusEl.className = 'adv-status err'; statusEl.textContent = `❌ JSON error: ${e.message}`; }
  }
}

function _advRefreshStatus(msg) {
  const el = document.getElementById('adv-save-status');
  if (!el) return;
  el.className = 'adv-status ok';
  el.textContent = `✅ ${msg}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.textContent = ''; el.className = ''; }, 2000);
}

        <div class="form-group mb-0">
          <label class="form-label">7-day bonus</label>
          <input type="number" value="${s.streakBonus7||3}" min="0" onchange="saveSetting('streakBonus7',parseInt(this.value)||0)">
        </div>
        <div class="form-group mb-0">
          <label class="form-label">14-day bonus</label>
          <input type="number" value="${s.streakBonus14||5}" min="0" onchange="saveSetting('streakBonus14',parseInt(this.value)||0)">
        </div>
        <div class="form-group mb-0">
          <label class="form-label">30-day bonus</label>
          <input type="number" value="${s.streakBonus30||10}" min="0" onchange="saveSetting('streakBonus30',parseInt(this.value)||0)">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔇 Not Listening</div>
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:14px">
        Hold the big red button on the parent dashboard to accumulate time. When you release, seconds convert to point deductions.
      </p>
      <div class="form-group">
        <label class="form-label">Seconds per point lost (default: 60)</label>
        <input type="number" value="${s.notListeningSecs||60}" min="1"
               onchange="saveSetting('notListeningSecs',parseInt(this.value)||60)">
      </div>
    </div>

    <div class="card" style="border:2px solid #1f2937">
      <div class="card-title" style="color:#1f2937">🔧 Advanced</div>
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:14px">
        Edit every value in the database directly — member stats, chore points, prize costs, settings, history, and raw JSON.
      </p>
      <button class="btn btn-sm" style="width:100%;background:#1f2937;color:#fff;font-size:0.95rem;padding:12px"
              onclick="showAdvancedEditor()">🔧 Open Advanced Editor</button>
    </div>

    <div class="card" style="border:2px solid #FEE2E2">
      <div class="card-title" style="color:#EF4444">⚠️ Danger Zone</div>
      <button class="btn btn-danger btn-sm" onclick="resetAllData()" style="width:100%">Reset All Data</button>
    </div>`;

  document.getElementById('parent-content').innerHTML = html;
}

function saveSetting(key, value) {
  D.settings[key] = value;
  saveData();
}


function showAddPointsModal(memberId) {
  const m = getMember(memberId);
  if (!m) return;
  showModal(`
    <div class="modal-title">⭐ Adjust Points — ${esc(m.name)}</div>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:16px">Current balance: <strong>${m.points||0} pts</strong></p>
    <div class="form-group">
      <label class="form-label">Points to add (use negative to remove)</label>
      <input type="number" id="adj-pts" placeholder="e.g. 25 or -10">
    </div>
    <div class="form-group">
      <label class="form-label">Reason <span class="form-label-hint">optional</span></label>
      <input type="text" id="adj-reason" placeholder="Bonus for helping...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAdjustPoints('${memberId}')">Apply ✓</button>
    </div>`);
}

function doAdjustPoints(memberId) {
  const m      = getMember(memberId);
  const pts    = parseInt(document.getElementById('adj-pts')?.value)||0;
  const reason = document.getElementById('adj-reason')?.value.trim() || 'Manual adjustment';
  if (!m || pts===0) { toast('Enter a non-zero amount'); return; }
  m.points      = Math.max(0, (m.points||0) + pts);
  m.totalEarned = pts>0 ? (m.totalEarned||0)+pts : m.totalEarned;
  addHistory('bonus', memberId, reason, pts);
  saveData();
  closeModal();
  toast(`${pts>0?'+':''}${pts} pts for ${m.name}`);
  renderParentSettings();
}

function resetAllData() {
  if (!confirm('This will erase ALL family data. Are you absolutely sure?')) return;
  if (!confirm('Last chance — really reset everything?')) return;
  localStorage.removeItem(LS_KEY);
  if (firestoreUnsub) { firestoreUnsub(); firestoreUnsub = null; }
  db.doc(FAMILY_DOC).delete().catch(e => console.warn('Firestore delete error:', e));
  D = defaultData();
  location.reload();
}

// ── GRANDMA VIEW ENTRY ────────────────────────────────────────
function renderGrandmaView() {

  document.getElementById('grandma-content').style.fontSize = '1.15rem';

function renderGrandmaHeader() {

  document.getElementById('grandma-header').innerHTML = `

// ── GRANDMA: TODAY ────────────────────────────────────────────
function renderGrandmaToday() {
  const t    = today();
  const acts = D.activities.filter(a=>a.date===t);
  const kids = D.family.members.filter(m=>m.role==='kid');

  let html = `
    <div class="card" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:18px;margin-bottom:16px">
      <div style="font-size:1.4rem;font-weight:800;margin-bottom:4px">📅 Today</div>
      <div style="font-size:1.1rem;opacity:0.9">${todayDisplay()}</div>
    </div>`;

  // Today's activities
  if (acts.length > 0) {
    html += `<div class="card"><div class="card-title" style="font-size:1.3rem">🗓️ Today's Plans</div>`;
    acts.forEach(a => { html += grandmaActivityCard(a); });
    html += `</div>`;
  } else {
    html += `<div class="card">
      <div class="card-title" style="font-size:1.3rem">🗓️ Today's Plans</div>
      <div style="text-align:center;padding:16px 0;color:var(--muted);font-size:1rem">No plans scheduled today</div>
    </div>`;
  }

  // Kids chore summary
  html += `<div class="card"><div class="card-title" style="font-size:1.3rem">⭐ Kids' Chores Today</div>`;
  if (kids.length === 0) {
    html += `<div style="color:var(--muted)">No kids in the family yet.</div>`;
  }
  kids.forEach(kid => {
    const myChores  = D.chores.filter(c=>c.assignedTo?.includes(kid.id));
    const doneCount = myChores.filter(c=>choreStatus(c,kid.id)==='done').length;
    const pct       = myChores.length>0 ? Math.round(doneCount/myChores.length*100) : 0;
    html += `
      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <span style="font-size:2.2rem">${kid.avatar||'🙂'}</span>
          <div>
            <div style="font-size:1.3rem;font-weight:700">${esc(kid.name)}</div>
            <div style="color:var(--muted)">${doneCount} of ${myChores.length} chores done · ⭐ ${kid.points||0} points</div>
          </div>
        </div>
        <div class="progress-wrap" style="height:14px">
          <div class="progress-fill" style="width:${pct}%;background:${kid.color||'var(--purple)'}"></div>
        </div>
        <div style="text-align:right;font-size:0.9rem;color:var(--muted);margin-top:4px">${pct}%</div>
      </div>`;
  });
  html += `</div>`;

  document.getElementById('grandma-content').innerHTML = html;
}

// ── GRANDMA: FAMILY ───────────────────────────────────────────
function renderGrandmaFamily() {
  const kids = D.family.members.filter(m=>m.role==='kid');
  let html = '';

  kids.forEach(kid => {
    const myChores = D.chores.filter(c=>c.assignedTo?.includes(kid.id));
    const done     = myChores.filter(c=>choreStatus(c,kid.id)==='done');
    const todo     = myChores.filter(c=>choreStatus(c,kid.id)==='none');

    html += `
      <div class="card" style="border-top:5px solid ${kid.color||'#6C63FF'}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <span style="font-size:3rem">${kid.avatar||'🙂'}</span>
          <div>
            <div style="font-size:1.4rem;font-weight:800">${esc(kid.name)}</div>
            <div style="color:var(--muted)">Age ${kid.age||'?'}</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-size:2rem;font-weight:800;color:${kid.color||'var(--purple)'}">⭐ ${kid.points||0}</div>
            <div style="font-size:0.85rem;color:var(--muted)">points</div>
          </div>
        </div>`;

    if (done.length > 0) {
      html += `<div style="font-weight:700;margin-bottom:8px;color:var(--green)">✅ Completed today:</div>`;
      done.forEach(c => {
        html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6">
          <span style="font-size:1.8rem">${c.icon}</span>
          <span style="font-size:1.1rem">${esc(c.title)}</span>
          <span style="margin-left:auto;color:var(--green);font-weight:700">+${c.points}</span>
        </div>`;
      });
    }

    if (todo.length > 0) {
      html += `<div style="font-weight:700;margin:10px 0 8px;color:var(--muted)">📋 Still to do:</div>`;
      todo.forEach(c => {
        html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;opacity:0.65">
          <span style="font-size:1.8rem">${c.icon}</span>
          <span style="font-size:1.1rem">${esc(c.title)}</span>
        </div>`;
      });
    }
    html += `</div>`;
  });

  // Team goals
  (D.teamGoals||[]).forEach(g => {
    const total  = goalTotal(g);
    const target = g.targetPoints||1;
    const pct    = Math.min(100,Math.round(total/target*100));
    html += `
      <div class="card" style="background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-radius:18px">
        <div style="font-size:1.3rem;font-weight:800;margin-bottom:4px">🏆 Team Prize: ${esc(g.title)}</div>
        <div style="margin-bottom:12px;opacity:0.85">${total} of ${target} points saved · ${pct}%</div>
        <div style="background:rgba(255,255,255,0.3);border-radius:999px;height:14px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:var(--yellow);border-radius:999px;transition:width 0.5s"></div>
        </div>
      </div>`;
  });

  if (kids.length === 0) {
    html = `<div class="empty-state"><div class="empty-icon">👶</div><div class="empty-text">No kids in the family yet.</div></div>`;
  }

  document.getElementById('grandma-content').innerHTML = html;
}

// ── GRANDMA: PLANS ────────────────────────────────────────────
function renderGrandmaPlans() {
  const t  = today();
  const upcoming = D.activities
    .filter(a=>a.date>=t)
    .sort((a,b)=>a.date.localeCompare(b.date));

  let html = `<div class="card-title" style="font-size:1.3rem">📅 Upcoming Plans</div>`;
  if (upcoming.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No upcoming plans yet.</div></div>`;
  }
  upcoming.forEach(a => { html += grandmaActivityCard(a); });
  document.getElementById('grandma-content').innerHTML = html;
}

function grandmaActivityCard(a) {
  const members = D.family.members;
  const whoText = (a.who||[]).map(id=>{
    const m = getMember(id);
    return m ? `${m.avatar} ${m.name}` : '';
  }).filter(Boolean).join(', ');
  return `
    <div style="display:flex;gap:14px;padding:16px;background:#F9FAFB;border-radius:14px;margin-bottom:12px;align-items:flex-start">
      <span style="font-size:2.5rem;flex-shrink:0">${a.icon||'📅'}</span>
      <div>
        <div style="font-size:1.2rem;font-weight:700">${esc(a.title)}</div>
        <div style="color:var(--muted);margin-top:4px">${fmtDate(a.date)}${a.time?' at '+a.time:''}</div>
        ${whoText?`<div style="margin-top:6px">${whoText}</div>`:''}
        ${a.notes?`<div style="margin-top:6px;color:var(--muted)">${esc(a.notes)}</div>`:''}
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   INIT — bootstrap the app on page load
═══════════════════════════════════════════════════════════════ */

function showLoading() {
  showScreen('screen-auth');
  const el = document.getElementById('screen-auth');
  el.style.cssText = 'background:linear-gradient(145deg,#667eea,#764ba2);align-items:center;justify-content:center;display:flex;flex-direction:column;gap:16px;text-align:center';
  el.innerHTML = `
    <div style="font-size:3.5rem">⭐</div>
    <div style="color:#fff;font-size:1.8rem;font-weight:800">Family Hub</div>
    <div style="color:rgba(255,255,255,0.8);font-size:1rem">⏳ Loading...</div>`;
}

function routeAfterLoad() {
  if (!D.setup || !D.family || D.family.members.length === 0) {
    S.setupMembers = [];
    S.setupStep    = 0;
    showScreen('screen-setup');
    renderSetupStep();
  } else {
    if (isAppUnlocked()) {
      const rememberedUser = getMember(getCurrentUserId());
      if (rememberedUser) {
        S.currentUser = rememberedUser;
        routeToView(rememberedUser);
      } else {
        renderHome();
      }
    } else showAppPin();
  }
}

function init() {
  loadData();
  const hasLocalData = D.setup && D.family && D.family.members.length > 0;

  if (hasLocalData) {
    // Fast path: local data exists — show PIN immediately, sync in background
    if (isAppUnlocked()) {
      const rememberedUser = getMember(getCurrentUserId());
      if (rememberedUser) {
        S.currentUser = rememberedUser;
        routeToView(rememberedUser);
      } else {
        renderHome();
      }
    } else showAppPin();
    auth.signInAnonymously()
      .then(() => subscribeToFirestore())
      .catch(err => console.warn('Firestore sync unavailable:', err));
  } else {
    // Slow path: no local data (fresh install or standalone PWA first launch)
    // Wait for Firestore before routing so we don't wrongly show setup wizard
    showLoading();
    auth.signInAnonymously()
      .then(() => subscribeToFirestore(routeAfterLoad))
      .catch(err => {
        console.warn('Firestore unavailable, falling back to local data:', err);
        routeAfterLoad();
      });
  }
}

// Start on DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

console.log('✅ Family Hub fully loaded!');
  </script>
