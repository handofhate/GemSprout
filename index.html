  if (actId) {
    const a = D.activities.find(x=>x.id===actId);
    if (a) Object.assign(a, { title, icon, date, time, who, notes });
  } else {
    D.activities.push({ id:genId(), title, icon, date, time, who, notes });
  }
  saveData();
  closeModal();
  toast(actId?'Event updated!':'Event added!');
  renderParentPlans();
}

function deleteActivity(actId) {
  if (!confirm('Delete this event?')) return;
  D.activities = D.activities.filter(a=>a.id!==actId);
  saveData();
  renderParentPlans();
}

function showAddPointsModal(memberId) {
  const m = getMember(memberId);
  if (!m) return;
  showModal(`
    <div class="modal-title">⭐ Adjust Points — ${esc(m.name)}</div>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:16px">Current balance: <strong>${m.points||0} pts</strong></p>
    <div class="form-group">
      <label class="form-label">Points to add (use negative to remove)</label>
      <input type="number" id="adj-pts" placeholder="e.g. 25 or -10">
    </div>
    <div class="form-group">
      <label class="form-label">Reason <span class="form-label-hint">optional</span></label>
      <input type="text" id="adj-reason" placeholder="Bonus for helping...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAdjustPoints('${memberId}')">Apply ✓</button>
    </div>`);
}

function doAdjustPoints(memberId) {
  const m      = getMember(memberId);
  const pts    = parseInt(document.getElementById('adj-pts')?.value)||0;
  const reason = document.getElementById('adj-reason')?.value.trim() || 'Manual adjustment';
  if (!m || pts===0) { toast('Enter a non-zero amount'); return; }
  m.points      = Math.max(0, (m.points||0) + pts);
  m.totalEarned = pts>0 ? (m.totalEarned||0)+pts : m.totalEarned;
  addHistory('bonus', memberId, reason, pts);
  saveData();
  closeModal();
  toast(`${pts>0?'+':''}${pts} pts for ${m.name}`);
  renderParentSettings();
}

function resetAllData() {
  if (!confirm('This will erase ALL family data. Are you absolutely sure?')) return;
  if (!confirm('Last chance — really reset everything?')) return;
  localStorage.removeItem(LS_KEY);
  if (firestoreUnsub) { firestoreUnsub(); firestoreUnsub = null; }
  db.doc(FAMILY_DOC).delete().catch(e => console.warn('Firestore delete error:', e));
  D = defaultData();
  location.reload();
}

// ── GRANDMA: TODAY ────────────────────────────────────────────
function renderGrandmaToday() {
  const t    = today();
  const acts = D.activities.filter(a=>a.date===t);
  const kids = D.family.members.filter(m=>m.role==='kid');

  let html = `
    <div class="card" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:18px;margin-bottom:16px">
      <div style="font-size:1.4rem;font-weight:800;margin-bottom:4px">📅 Today</div>
      <div style="font-size:1.1rem;opacity:0.9">${todayDisplay()}</div>
    </div>`;

  // Today's activities
  if (acts.length > 0) {
    html += `<div class="card"><div class="card-title" style="font-size:1.3rem">🗓️ Today's Plans</div>`;
    acts.forEach(a => { html += grandmaActivityCard(a); });
    html += `</div>`;
  } else {
    html += `<div class="card">
      <div class="card-title" style="font-size:1.3rem">🗓️ Today's Plans</div>
      <div style="text-align:center;padding:16px 0;color:var(--muted);font-size:1rem">No plans scheduled today</div>
    </div>`;
  }

  // Kids chore summary
  html += `<div class="card"><div class="card-title" style="font-size:1.3rem">⭐ Kids' Chores Today</div>`;
  if (kids.length === 0) {
    html += `<div style="color:var(--muted)">No kids in the family yet.</div>`;
  }
  kids.forEach(kid => {
    const myChores  = D.chores.filter(c=>c.assignedTo?.includes(kid.id));
    const doneCount = myChores.filter(c=>choreStatus(c,kid.id)==='done').length;
    const pct       = myChores.length>0 ? Math.round(doneCount/myChores.length*100) : 0;
    html += `
      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <span style="font-size:2.2rem">${kid.avatar||'🙂'}</span>
          <div>
            <div style="font-size:1.3rem;font-weight:700">${esc(kid.name)}</div>
            <div style="color:var(--muted)">${doneCount} of ${myChores.length} chores done · ⭐ ${kid.points||0} points</div>
          </div>
        </div>
        <div class="progress-wrap" style="height:14px">
          <div class="progress-fill" style="width:${pct}%;background:${kid.color||'var(--purple)'}"></div>
        </div>
        <div style="text-align:right;font-size:0.9rem;color:var(--muted);margin-top:4px">${pct}%</div>
      </div>`;
  });
  html += `</div>`;

  document.getElementById('grandma-content').innerHTML = html;
}

// ── GRANDMA: FAMILY ───────────────────────────────────────────
function renderGrandmaFamily() {
  const kids = D.family.members.filter(m=>m.role==='kid');
  let html = '';

  kids.forEach(kid => {
    const myChores = D.chores.filter(c=>c.assignedTo?.includes(kid.id));
    const done     = myChores.filter(c=>choreStatus(c,kid.id)==='done');
    const todo     = myChores.filter(c=>choreStatus(c,kid.id)==='none');

    html += `
      <div class="card" style="border-top:5px solid ${kid.color||'#6C63FF'}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <span style="font-size:3rem">${kid.avatar||'🙂'}</span>
          <div>
            <div style="font-size:1.4rem;font-weight:800">${esc(kid.name)}</div>
            <div style="color:var(--muted)">Age ${kid.age||'?'}</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-size:2rem;font-weight:800;color:${kid.color||'var(--purple)'}">⭐ ${kid.points||0}</div>
            <div style="font-size:0.85rem;color:var(--muted)">points</div>
          </div>
        </div>`;

    if (done.length > 0) {
      html += `<div style="font-weight:700;margin-bottom:8px;color:var(--green)">✅ Completed today:</div>`;
      done.forEach(c => {
        html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6">
          <span style="font-size:1.8rem">${c.icon}</span>
          <span style="font-size:1.1rem">${esc(c.title)}</span>
          <span style="margin-left:auto;color:var(--green);font-weight:700">+${c.points}</span>
        </div>`;
      });
    }

    if (todo.length > 0) {
      html += `<div style="font-weight:700;margin:10px 0 8px;color:var(--muted)">📋 Still to do:</div>`;
      todo.forEach(c => {
        html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;opacity:0.65">
          <span style="font-size:1.8rem">${c.icon}</span>
          <span style="font-size:1.1rem">${esc(c.title)}</span>
        </div>`;
      });
    }
    html += `</div>`;
  });

  // Family goal
  const g = D.familyGoal;
  if (g) {
    const total  = goalTotal();
    const target = g.targetPoints||1;
    const pct    = Math.min(100,Math.round(total/target*100));
    html += `
      <div class="card" style="background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-radius:18px">
        <div style="font-size:1.3rem;font-weight:800;margin-bottom:4px">🎯 Family Goal: ${esc(g.title)}</div>
        <div style="margin-bottom:12px;opacity:0.85">${total} of ${target} points saved · ${pct}%</div>
        <div style="background:rgba(255,255,255,0.3);border-radius:999px;height:14px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:var(--yellow);border-radius:999px;transition:width 0.5s"></div>
        </div>
      </div>`;
  }

  if (kids.length === 0) {
    html = `<div class="empty-state"><div class="empty-icon">👶</div><div class="empty-text">No kids in the family yet.</div></div>`;
  }

  document.getElementById('grandma-content').innerHTML = html;
}

// ── GRANDMA: PLANS ────────────────────────────────────────────
function renderGrandmaPlans() {
  const t  = today();
  const upcoming = D.activities
    .filter(a=>a.date>=t)
    .sort((a,b)=>a.date.localeCompare(b.date));

  let html = `<div class="card-title" style="font-size:1.3rem">📅 Upcoming Plans</div>`;
  if (upcoming.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No upcoming plans yet.</div></div>`;
  }
  upcoming.forEach(a => { html += grandmaActivityCard(a); });
  document.getElementById('grandma-content').innerHTML = html;
}

function grandmaActivityCard(a) {
  const members = D.family.members;
  const whoText = (a.who||[]).map(id=>{
    const m = getMember(id);
    return m ? `${m.avatar} ${m.name}` : '';
  }).filter(Boolean).join(', ');
  return `
    <div style="display:flex;gap:14px;padding:16px;background:#F9FAFB;border-radius:14px;margin-bottom:12px;align-items:flex-start">
      <span style="font-size:2.5rem;flex-shrink:0">${a.icon||'📅'}</span>
      <div>
        <div style="font-size:1.2rem;font-weight:700">${esc(a.title)}</div>
        <div style="color:var(--muted);margin-top:4px">${fmtDate(a.date)}${a.time?' at '+a.time:''}</div>
        ${whoText?`<div style="margin-top:6px">${whoText}</div>`:''}
        ${a.notes?`<div style="margin-top:6px;color:var(--muted)">${esc(a.notes)}</div>`:''}
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   INIT — bootstrap the app on page load
═══════════════════════════════════════════════════════════════ */

function showLoading() {
  showScreen('screen-auth');
  const el = document.getElementById('screen-auth');
  el.style.cssText = 'background:linear-gradient(145deg,#667eea,#764ba2);align-items:center;justify-content:center;display:flex;flex-direction:column;gap:16px;text-align:center';
  el.innerHTML = `
    <div style="font-size:3.5rem">⭐</div>
    <div style="color:#fff;font-size:1.8rem;font-weight:800">Family Hub</div>
    <div style="color:rgba(255,255,255,0.8);font-size:1rem">⏳ Loading...</div>`;
}

function routeAfterLoad() {
  if (!D.setup || !D.family || D.family.members.length === 0) {
    S.setupMembers = [];
    S.setupStep    = 0;
    showScreen('screen-setup');
    renderSetupStep();
  } else {
    showAppPin();
  }
}

function init() {
  loadData();
  const hasLocalData = D.setup && D.family && D.family.members.length > 0;

  if (hasLocalData) {
    // Fast path: local data exists — show PIN immediately, sync in background
    showAppPin();
    auth.signInAnonymously()
      .then(() => subscribeToFirestore())
      .catch(err => console.warn('Firestore sync unavailable:', err));
  } else {
    // Slow path: no local data (fresh install or standalone PWA first launch)
    // Wait for Firestore before routing so we don't wrongly show setup wizard
    showLoading();
    auth.signInAnonymously()
      .then(() => subscribeToFirestore(routeAfterLoad))
      .catch(err => {
        console.warn('Firestore unavailable, falling back to local data:', err);
        routeAfterLoad();
      });
  }
}

// Start on DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

console.log('✅ Family Hub fully loaded!');
  </script>
</body>
